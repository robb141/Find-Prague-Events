name: Update events

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Prague
      TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Fetch the next 30 days
        run: python3 fetch_events.py --days 30 --strict-health --health-report health-report.json

      - name: Commit updated event data
        run: |
          if git diff --quiet -- data.js; then
            echo "Event data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "Update Prague events"
          git push
